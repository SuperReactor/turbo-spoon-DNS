name: Run Apple Silicon DNS
on: [push, workflow_dispatch]

jobs:
  run-dns:
    runs-on: macos-14  # Native M1 Apple Silicon

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: System Info & IP
        run: |
          echo "Architecture: $(uname -m)"
          echo "Public IP: $(curl -sL https://api.ipify.org)"

      - name: Set Permissions
        run: chmod +x dns-folder/dns-server

      - name: Start DNS Server
        run: |
          cd dns-folder
          sudo ./dns-server &
          sleep 5

      - name: Test Local Resolution
        run: |
          # This proves it works even if you can't connect from home
          dig @127.0.0.1 google.com
