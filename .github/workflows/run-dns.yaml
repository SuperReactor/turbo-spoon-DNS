name: Run Apple Silicon DNS
on: [push, workflow_dispatch]

jobs:
  run-dns:
    # 'macos-14' targets the Apple Silicon M1 runner
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Runner Public IP
        # Prints the public IP of the runner machine for verification
        run: curl -s https://ipify.org && echo ""

      - name: Set Permissions
        # Ensures your executable is allowed to run
        run: chmod +x dns-folder/dns-server

      - name: Start DNS Server
        run: |
          cd dns-folder
          # Use sudo to allow binding to privileged port 53
          sudo ./dns-server &
          sleep 5 # Wait for the server to fully initialize

      - name: Test Local Resolution
        run: |
          # Proves the server is working by querying it locally
          # Replace 'google.com' with a domain your DNS is configured to handle
          dig @127.0.0.1 google.com
